# Workflow name - shown in the GitHub Actions tab
name: Playwright Tests

# Triggers - when this workflow runs
on:
  push:
    branches: [ main, master ]   # runs on every push to main/master
  # pull_request:
  #   branches: [ main, master ]   # runs on every PR targeting main/master
  workflow_dispatch:             # enables manual "Run workflow" button in GitHub Actions UI

# Permissions required for GitHub Pages deployment
permissions:
  contents: read
  pages: write       # allows deploying to GitHub Pages
  id-token: write    # required for OIDC token used by actions/deploy-pages

# Use Node.js 24 for all actions to avoid deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    # Cancel the job if it runs longer than 60 minutes (prevents hung runners)
    timeout-minutes: 60

    # The type of machine to run on - ubuntu-latest is the standard CI runner
    runs-on: ubuntu-latest

    steps:
      # Step 1 - Check out the repository code onto the runner
      - uses: actions/checkout@v4

      # Step 2 - Set up Node.js using the latest LTS version
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      # Step 3 - Cache node_modules
      # Cache key is a hash of package-lock.json - any dependency change
      # produces a different hash, invalidating the cache and triggering a fresh install
      - name: Cache node_modules
        uses: actions/cache@v4
        id: node-cache
        with:
          path: node_modules
          key: node-${{ hashFiles('package-lock.json') }}

      # Step 4 - Install npm dependencies (only on cache miss)
      # Skipped entirely if node_modules cache is still valid
      - name: Install dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm ci

      # Step 5 - Cache Playwright browsers
      # Same cache key strategy - invalidated only when package-lock.json changes
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      # Step 6 - Install Playwright browsers (only on cache miss)
      # --with-deps also installs OS-level dependencies required by the browsers
      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      # Step 7 - Run all Playwright tests
      # Secrets are stored in GitHub → Settings → Secrets and Variables → Actions
      # They are injected here as environment variables - same names as .env locally
      # dotenv in playwright.config.js reads process.env, so this works transparently
      - name: Run Playwright tests
        run: npx playwright test
        env:
          STANDARD_USER: ${{ secrets.STANDARD_USER }}
          LOCKED_OUT_USER: ${{ secrets.LOCKED_OUT_USER }}
          PROBLEM_USER: ${{ secrets.PROBLEM_USER }}
          PERFORMANCE_GLITCH_USER: ${{ secrets.PERFORMANCE_GLITCH_USER }}
          ERROR_USER: ${{ secrets.ERROR_USER }}
          VISUAL_USER: ${{ secrets.VISUAL_USER }}
          PASSWORD: ${{ secrets.PASSWORD }}

      # Step 8 - Copy Playwright report into docs/report/ BEFORE Jekyll builds
      # Jekyll will include it in the build - avoids permission issues with _site/
      # Accessible at: https://mahadevmg.github.io/Shopflo-Assignment/report/
      - name: Copy Playwright report into docs
        if: ${{ !cancelled() }}
        run: |
          mkdir -p docs/report
          cp -r playwright-report/. docs/report/

      # Step 9 - Configure GitHub Pages
      - name: Setup Pages
        if: ${{ !cancelled() }}
        uses: actions/configure-pages@v4

      # Step 10 - Build Jekyll site from docs/ into _site/
      # docs/report/ is included in the build so the report is part of the site
      - name: Build Jekyll site
        if: ${{ !cancelled() }}
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      # Step 11 - Upload built site (includes report) as a Pages artifact
      - name: Upload Pages artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  # Deploy job - Pages deployment only runs on master push, not PRs
  # PRs cannot deploy to Pages due to GitHub environment protection rules
  deploy:
    needs: test
    if: github.event_name != 'pull_request' && !cancelled()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}   # printed in Actions UI after deploy
    steps:
      # Deploys the artifact uploaded in the test job to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
