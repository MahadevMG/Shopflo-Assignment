# Workflow name — shown in the GitHub Actions tab
name: Playwright Tests

# Triggers — when this workflow runs
on:
  push:
    branches: [ main, master ]   # runs on every push to main/master
  pull_request:
    branches: [ main, master ]   # runs on every PR targeting main/master

jobs:
  test:
    # Cancel the job if it runs longer than 60 minutes (prevents hung runners)
    timeout-minutes: 60

    # The type of machine to run on — ubuntu-latest is the standard CI runner
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Check out the repository code onto the runner
      - uses: actions/checkout@v4

      # Step 2 — Set up Node.js using the latest LTS version
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      # Step 3 — Install npm dependencies
      # `npm ci` is used instead of `npm install` because:
      #   - it installs exact versions from package-lock.json (reproducible builds)
      #   - it fails if package-lock.json is out of sync with package.json
      #   - it's faster on CI since it skips the resolution step
      - name: Install dependencies
        run: npm ci

      # Step 4 — Download Playwright browsers (Chromium, Firefox, WebKit)
      # --with-deps also installs OS-level dependencies required by the browsers
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # Step 5 — Run all Playwright tests
      # Environment variables (STANDARD_USER, PASSWORD etc.) are injected from
      # GitHub repository secrets — Settings → Secrets and Variables → Actions
      - name: Run Playwright tests
        run: npx playwright test

      # Step 6 — Upload the HTML report as a downloadable artifact
      # `if: !cancelled()` ensures the report uploads even when tests fail,
      # so you can always inspect results after a failed run
      # Report is retained for 30 days before GitHub auto-deletes it
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
